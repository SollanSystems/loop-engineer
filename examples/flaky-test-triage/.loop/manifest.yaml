# .loop/manifest.yaml — the explicit operating contract for one loop
# Scaffolded by [[loop-contract]] from ADR.md. Canonical schema: reference/repo-os-contract.md §10.
loop: flaky-test-triage
schema: loop-engineer/manifest@1

inputs:
  goal: "Make the scheduler's job-order test deterministic across interpreter runs."
  success_criteria:
    - "1: visible suite passes under all 5 probe PYTHONHASHSEEDs — score 1.0 (target/measure_stability.py)"
    - "2: job order is a function of the data, independent of input order (target/test_holdout.py)"
  constraints:
    - "Do not modify the public next_jobs / load_jobs signatures."
    - "No new third-party dependencies."
    - "Do not edit tests, fixtures, golden files, or the verify scripts to manufacture a passing gate."
  workspace_path: "./"
  allowed_tools: [read, workspace-write]      # NOT network, NOT external-side-effects
  risk_profile: low                           # low | med | high
  time_budget: "30m"
  cost_budget: "1.00usd"
  approval_policy: on_side_effects            # never | on_side_effects | strict

outputs:
  plan: SPEC.md
  task_queue: TASKS.json
  current_state: .loop/state.json
  verification_bundle: .loop/artifacts/
  repair_actions: .loop/repair/iter-002.json
  terminal_state: .loop/terminal_state.json
  lessons_learned: .loop/memory/lessons.md

permissions:                                  # least-privilege tiers
  - read-only
  - workspace-write
  # network / external-side-effects / production-mutation are OFF for this loop

approval_gates:                               # each pauses-and-resumes from run state
  - destructive_commands
  - secret_access
  - production_changes

policies:
  repair_cap: 2                               # then replan | revert | approve | terminate
  plan_then_execute: false                    # set true for untrusted/web environments
  verifier_gaming: hard_terminate_as_security_failure

terminal_states:                              # the canonical 7, verbatim
  - Succeeded
  - FailedUnverifiable
  - FailedBlocked
  - FailedBudget
  - FailedSafety
  - FailedSpecGap
  - AbortedByHuman
